<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Confeitaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧁 Gestão Confeitaria</h1>
            <p>Nova Venda</p>
        </header>

        <form id="formVenda">
            <div class="form-group">
                <label for="produto">Produto:</label>
                <select id="produto" required>
                    <option value="">Selecione o produto...</option>
                    <option value="pao_de_mel">Pão de Mel</option>
                    <option value="bolo_pote">Bolo de Pote</option>
                    <option value="torta_morango">Torta de Morango Inteira</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade Vendida:</label>
                <input type="number" id="quantidade" min="1" required>
            </div>

            <div class="form-group">
                <label for="valorTotal">Valor Total (R$):</label>
                <input type="number" id="valorTotal" step="0.01" required>
            </div>

            <button type="submit" id="btnSalvar">Registrar Venda</button>
        </form>

        <div id="mensagem" class="hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
